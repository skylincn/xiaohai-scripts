<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC·幻天屿 - 表情包生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00aa;
            --neon-purple: #b967ff;
            --neon-green: #39ff14;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #1e1e2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 320px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 18px;
            color: var(--neon-pink);
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
        }
        .login-box input:focus { outline: none; border-color: var(--neon-pink); }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .login-error {
            color: #ff6b6b;
            margin-top: 12px;
            display: none;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover, .tab-btn.active {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 80px; resize: vertical; }
        textarea:focus, input:focus { outline: none; border-color: var(--neon-pink); }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .style-btn {
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }
        .style-btn:hover, .style-btn.active {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        .size-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .size-tabs button {
            padding: 8px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
        }
        .size-tabs button.active {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            color: #000;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .setting-item label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .setting-item select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 2px dashed var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
        }
        .file-preview {
            margin-top: 12px;
            display: none;
        }
        .file-preview img {
            max-width: 200px;
            border-radius: 8px;
            border: 2px solid var(--neon-purple);
        }
        .sticker-grid {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .sticker-grid.size-4 { grid-template-columns: repeat(2, 1fr); }
        .sticker-grid.size-8 { grid-template-columns: repeat(4, 1fr); }
        .sticker-grid.size-9 { grid-template-columns: repeat(3, 1fr); }
        .sticker-grid.size-16 { grid-template-columns: repeat(4, 1fr); }
        .sticker-cell {
            aspect-ratio: 1;
            background: var(--bg-dark);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .sticker-cell:hover {
            border-color: var(--neon-cyan);
        }
        .sticker-cell.has-image {
            border-style: solid;
            border-color: var(--neon-green);
        }
        .cell-num {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--neon-cyan);
        }
        .cell-placeholder { font-size: 24px; color: var(--text-dim); }
        .cell-img { width: 100%; height: 100%; object-fit: cover; }
        .cell-actions {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        .cell-actions button {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }
        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-bar {
            height: 4px;
            background: var(--bg-dark);
            border-radius: 2px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
            width: 0%;
            transition: width 0.3s;
        }
        .text-edit-panel {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            display: none;
        }
        .text-edit-panel.active { display: block; }
        .text-edit-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .text-edit-row label {
            min-width: 80px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .text-edit-row input[type="range"] { flex: 1; }
        .export-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .export-item {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .export-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .export-label {
            padding: 8px;
            font-size: 11px;
            color: var(--neon-cyan);
        }
        .settings-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .settings-row label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .settings-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
        .log-area {
            max-height: 150px;
            overflow-y: auto;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 16px;
        }
        .log-line { padding: 4px 0; }
        .log-line.success { color: var(--neon-green); }
        .log-line.error { color: #ff6b6b; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 0, 170, 0.3);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🎭 MSC·幻天屿</h2>
            <input type="text" id="loginUser" placeholder="用户名">
            <input type="password" id="loginPass" placeholder="密码">
            <button onclick="doLogin()">登录</button>
            <div class="login-error" id="loginError">用户名或密码错误</div>
        </div>
    </div>

    <header class="header">
        <span class="logo-text">MSC·幻天屿</span>
    </header>

    <main class="container">
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="batch">批量生成</button>
            <button class="tab-btn" data-tab="style">风格转换</button>
            <button class="tab-btn" data-tab="text">文字编辑</button>
            <button class="tab-btn" data-tab="export">导出</button>
        </div>

        <!-- 批量生成 -->
        <div class="tab-content active" id="tab-batch">
            <div class="card">
                <div class="section-title">表情包批量生成</div>
                <div class="size-tabs">
                    <button data-size="4">4格</button>
                    <button data-size="8" class="active">8格</button>
                    <button data-size="9">9格</button>
                    <button data-size="16">16格</button>
                </div>
                <div style="margin-bottom:16px;">
                    <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px;">角色描述</label>
                    <input type="text" id="mainPrompt" placeholder="如：一只可爱的小白兔，圆滚滚的身体">
                </div>
                <div style="margin-bottom:16px;">
                    <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px;">表情列表（逗号分隔）</label>
                    <input type="text" id="expressionPrompt" placeholder="如：开心,生气,哭泣,惊讶,害羞,睡觉,吃瓜,疑惑">
                </div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>风格</label>
                        <select id="styleSelect">
                            <option value="可爱卡通">可爱卡通</option>
                            <option value="简约线条">简约线条</option>
                            <option value="像素风">像素风</option>
                            <option value="水彩风">水彩风</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>背景</label>
                        <select id="bgSelect">
                            <option value="透明背景">透明背景</option>
                            <option value="白色背景">白色背景</option>
                            <option value="渐变背景">渐变背景</option>
                        </select>
                    </div>
                </div>
                <button class="generate-btn" onclick="generateBatch()">🚀 开始生成</button>
                <div class="progress-bar" id="batchProgress">
                    <div class="progress-fill" id="batchProgressFill"></div>
                </div>
            </div>
        </div>

        <!-- 风格转换 -->
        <div class="tab-content" id="tab-style">
            <div class="card">
                <div class="section-title">风格转换</div>
                <div class="file-input-wrapper">
                    <input type="file" id="styleImage" accept="image/*" onchange="previewStyleImage(event)">
                    <div class="file-preview" id="stylePreview">
                        <img id="stylePreviewImg" alt="预览">
                    </div>
                </div>
                <div style="margin-top:16px;">
                    <label style="font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px;">转换提示词</label>
                    <input type="text" id="stylePrompt" value="转换为卡通表情风格，透明背景，高质量">
                </div>
                <button class="generate-btn" onclick="convertStyle()">🔄 转换风格</button>
            </div>
        </div>

        <!-- 文字编辑 -->
        <div class="tab-content" id="tab-text">
            <div class="card">
                <div class="section-title">点击表情添加文字</div>
                <div class="sticker-grid size-8" id="textGrid"></div>
                <div class="text-edit-panel" id="textEditPanel">
                    <div style="font-size:14px;color:var(--neon-cyan);margin-bottom:12px;">编辑第 <span id="editCellNum">1</span> 格</div>
                    <div class="text-edit-row">
                        <label>文字:</label>
                        <input type="text" id="editText" placeholder="输入文字">
                    </div>
                    <div class="text-edit-row">
                        <label>大小:</label>
                        <input type="range" id="editFontSize" min="10" max="40" value="20">
                        <span id="fontSizeVal" style="color:var(--text-dim);font-size:12px;">20px</span>
                    </div>
                    <div class="text-edit-row">
                        <label>颜色:</label>
                        <input type="color" id="editColor" value="#ffffff" style="width:60px;height:32px;">
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;">
                        <button class="style-btn" onclick="applyText()" style="flex:1;">应用</button>
                        <button class="style-btn" onclick="closeTextEdit()">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 导出 -->
        <div class="tab-content" id="tab-export">
            <div class="card">
                <div class="section-title">导出表情包</div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>表情包名称(4字)</label>
                        <input type="text" id="packName" placeholder="萌兔" maxlength="4" style="width:100%;">
                    </div>
                    <div class="setting-item">
                        <label>表情名称(8字)</label>
                        <input type="text" id="stickerName" placeholder="可爱小兔子" maxlength="8" style="width:100%;">
                    </div>
                </div>
                <button class="generate-btn" onclick="generateExport()">📦 生成导出</button>
                <div class="export-grid" id="exportGrid"></div>
                <div class="log-area" id="exportLog"></div>
            </div>
        </div>

        <!-- 预览区 -->
        <div class="card">
            <div class="section-title">表情预览</div>
            <div class="sticker-grid size-8" id="stickerGrid"></div>
        </div>

        <!-- API 设置 -->
        <div class="card">
            <div class="section-title">API 设置</div>
            <div class="settings-row">
                <label>Base URL</label>
                <input type="text" id="baseUrl" placeholder="https://api.example.com/v1">
            </div>
            <div class="settings-row" style="margin-top:12px;">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入 API Key">
                <button class="style-btn" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <button class="modal-close">✕</button>
        <img id="modalImg" src="" alt="预览">
    </div>

    <script src="auth.js"></script>
    <script>
        // 登录
        const VALID_USER = 'admin';
        const VALID_PASS_HASH = 'eGlhb2hhaXhpYQ==';
        
        function checkLogin() {
            if (sessionStorage.getItem('msc_logged_in') === '1') {
                document.getElementById('loginOverlay').classList.add('hidden');
                return true;
            }
            return false;
        }
        
        function doLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if (user === VALID_USER && pass === atob(VALID_PASS_HASH)) {
                sessionStorage.setItem('msc_logged_in', '1');
                document.getElementById('loginOverlay').classList.add('hidden');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            checkLogin();
            initGrid();
            initTabs();
            initSizeTabs();
            loadSettings();
        });

        // Tab 切换
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                });
            });
        }

        // 设置
        function loadSettings() {
            const savedKey = localStorage.getItem('msc_api_key');
            const savedUrl = localStorage.getItem('msc_base_url');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            if (savedUrl) document.getElementById('baseUrl').value = savedUrl;
        }
        
        function saveSettings() {
            localStorage.setItem('msc_api_key', document.getElementById('apiKey').value);
            localStorage.setItem('msc_base_url', document.getElementById('baseUrl').value);
            alert('已保存');
        }

        // 网格大小
        let currentSize = 8;
        let stickers = {};
        
        function initSizeTabs() {
            document.querySelectorAll('.size-tabs button').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.size-tabs button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSize = parseInt(btn.dataset.size);
                    initGrid();
                });
            });
        }
        
        function initGrid() {
            const grid = document.getElementById('stickerGrid');
            const textGrid = document.getElementById('textGrid');
            grid.className = 'sticker-grid size-' + currentSize;
            textGrid.className = 'sticker-grid size-' + currentSize;
            grid.innerHTML = '';
            textGrid.innerHTML = '';
            
            for (let i = 1; i <= currentSize; i++) {
                grid.appendChild(createCell(i));
                textGrid.appendChild(createTextCell(i));
            }
        }
        
        function createCell(index) {
            const cell = document.createElement('div');
            cell.className = 'sticker-cell';
            cell.dataset.index = index;
            const data = stickers[index];
            if (data?.image) {
                cell.classList.add('has-image');
                cell.innerHTML = `
                    <span class="cell-num">${String(index).padStart(2,'0')}</span>
                    <img class="cell-img" src="${data.image}" onclick="showModal('${data.image}')">
                    <div class="cell-actions">
                        <button onclick="event.stopPropagation();deleteSticker(${index})">删除</button>
                    </div>
                `;
            } else {
                cell.innerHTML = `<span class="cell-num">${String(index).padStart(2,'0')}</span><span class="cell-placeholder">+</span>`;
                cell.onclick = () => uploadSticker(index);
            }
            return cell;
        }
        
        function createTextCell(index) {
            const cell = document.createElement('div');
            cell.className = 'sticker-cell' + (stickers[index]?.image ? ' has-image' : '');
            cell.dataset.index = index;
            cell.innerHTML = `<span class="cell-num">${String(index).padStart(2,'0')}</span><span class="cell-placeholder">${stickers[index]?.image ? '✏️' : '+'}</span>`;
            cell.onclick = () => openTextEdit(index);
            return cell;
        }
        
        function uploadSticker(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    stickers[index] = { image: ev.target.result, text: '', textStyle: {} };
                    initGrid();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        function deleteSticker(index) {
            delete stickers[index];
            initGrid();
        }

        // 批量生成
        async function generateBatch() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim() || '/api-proxy/v1';
            const mainPrompt = document.getElementById('mainPrompt').value.trim();
            const expressions = document.getElementById('expressionPrompt').value.split(/[,，]/).map(e => e.trim()).filter(e => e);
            const style = document.getElementById('styleSelect').value;
            const bg = document.getElementById('bgSelect').value;
            
            if (!mainPrompt) { alert('请输入角色描述'); return; }
            if (!apiKey) { alert('请输入 API Key'); return; }
            if (expressions.length === 0) { alert('请输入表情列表'); return; }
            
            const progressBar = document.getElementById('batchProgress');
            const progressFill = document.getElementById('batchProgressFill');
            progressBar.classList.add('active');
            
            const count = Math.min(expressions.length, currentSize);
            for (let i = 0; i < count; i++) {
                const prompt = `${mainPrompt}，${expressions[i]}，${style}风格，${bg}，微信表情包风格`;
                progressFill.style.width = `${(i / count) * 100}%`;
                
                try {
                    const response = await fetch(`${baseUrl}/images/generations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: 'gpt-image-2-all', prompt, response_format: 'b64_json' })
                    });
                    if (!response.ok) continue;
                    const data = await response.json();
                    if (data.data?.[0]?.b64_json) {
                        stickers[i + 1] = { image: `data:image/png;base64,${data.data[0].b64_json}`, text: '', textStyle: {} };
                        initGrid();
                    }
                } catch (e) { console.error(e); }
            }
            progressFill.style.width = '100%';
            setTimeout(() => progressBar.classList.remove('active'), 500);
        }

        // 风格转换
        let styleImageBase64 = null;
        function previewStyleImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                styleImageBase64 = e.target.result.split(',')[1];
                document.getElementById('stylePreviewImg').src = e.target.result;
                document.getElementById('stylePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        async function convertStyle() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim() || '/api-proxy/v1';
            if (!apiKey) { alert('请输入 API Key'); return; }
            if (!styleImageBase64) { alert('请先上传图片'); return; }
            
            const prompt = document.getElementById('stylePrompt').value;
            try {
                const response = await fetch(`${baseUrl}/images/edits`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: 'gpt-image-2-all', prompt, image: styleImageBase64 })
                });
                if (!response.ok) throw new Error('转换失败');
                const data = await response.json();
                if (data.data?.[0]?.b64_json) {
                    stickers[1] = { image: `data:image/png;base64,${data.data[0].b64_json}`, text: '', textStyle: {} };
                    initGrid();
                    alert('转换成功');
                }
            } catch (e) { alert(e.message); }
        }

        // 文字编辑
        let editingIndex = null;
        function openTextEdit(index) {
            if (!stickers[index]?.image) { alert('请先生成或上传图片'); return; }
            editingIndex = index;
            document.getElementById('editCellNum').textContent = index;
            document.getElementById('editText').value = stickers[index].text || '';
            document.getElementById('editFontSize').value = stickers[index].textStyle?.fontSize || 20;
            document.getElementById('editColor').value = stickers[index].textStyle?.color || '#ffffff';
            document.getElementById('textEditPanel').classList.add('active');
        }
        
        function applyText() {
            if (!editingIndex) return;
            stickers[editingIndex].text = document.getElementById('editText').value;
            stickers[editingIndex].textStyle = {
                fontSize: document.getElementById('editFontSize').value,
                color: document.getElementById('editColor').value
            };
            closeTextEdit();
            log('success', `第${editingIndex}格文字已更新`);
        }
        
        function closeTextEdit() {
            document.getElementById('textEditPanel').classList.remove('active');
            editingIndex = null;
        }
        
        document.getElementById('editFontSize')?.addEventListener('input', (e) => {
            document.getElementById('fontSizeVal').textContent = e.target.value + 'px';
        });

        // 导出
        async function generateExport() {
            const grid = document.getElementById('exportGrid');
            grid.innerHTML = '';
            log('info', '生成导出预览...');
            
            for (let i = 1; i <= currentSize; i++) {
                const data = stickers[i];
                const item = document.createElement('div');
                item.className = 'export-item';
                
                if (data?.image) {
                    const thumb = await createThumbnail(data.image, 120, 120);
                    item.innerHTML = `<img src="${thumb}"><div class="export-label">#${String(i).padStart(2,'0')}</div>`;
                } else {
                    item.innerHTML = `<div style="aspect-ratio:1;background:var(--bg-card);display:flex;align-items:center;justify-content:center;color:var(--text-dim);">?</div><div class="export-label">#${String(i).padStart(2,'0')}</div>`;
                }
                grid.appendChild(item);
            }
            log('success', '导出预览完成');
        }
        
        function createThumbnail(base64, w, h) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL());
                };
                img.onerror = () => resolve('');
                img.src = base64;
            });
        }
        
        function log(type, msg) {
            const logEl = document.getElementById('exportLog');
            const line = document.createElement('div');
            line.className = 'log-line ' + type;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 大图预览
        function showModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
    </script>
</body>
</html>
