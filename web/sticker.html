<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC·幻天屿 - 表情包生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00aa;
            --neon-purple: #b967ff;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #1e1e2e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }
        
        /* 顶部栏 */
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        /* 登录遮罩 */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-overlay.hidden { display: none; }
        
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 320px;
        }
        
        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 18px;
            color: var(--neon-cyan);
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        
        .login-box button:hover { opacity: 0.9; }
        
        /* 输入区域 */
        .input-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }
        
        textarea::placeholder { color: var(--text-dim); }
        
        /* 风格选择 */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        
        .style-btn {
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .style-btn:hover, .style-btn.active {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        
        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }
        
        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 进度条 */
        .progress-bar {
            height: 4px;
            background: var(--bg-dark);
            border-radius: 2px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-bar.active { display: block; }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            width: 0%;
            transition: width 0.3s;
        }
        
        /* 结果展示 */
        .result-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        
        .result-item {
            background: var(--bg-dark);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .result-item img {
            width: 100%;
            display: block;
        }
        
        .result-item .img-title {
            padding: 8px;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
        }
        
        .status-msg {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
            font-size: 14px;
        }
        
        /* 设置 */
        .settings-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .settings-row label {
            font-size: 13px;
            color: var(--text-dim);
        }
        
        .settings-row input, .settings-row select {
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
        
        .settings-row input { flex: 1; min-width: 200px; }
        
        /* 张数选择 */
        .count-select {
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <header class="header">
        <img src="msc_logo.png" class="logo" alt="MSC Logo" onerror="this.style.display='none'">
        <span class="logo-text">MSC·幻天屿</span>
    </header>
    
    <!-- 主内容 -->
    <main class="container">
        <!-- 表情包描述 -->
        <div class="input-section">
            <div class="section-title">描述你的表情包</div>
            <textarea id="promptInput" placeholder="比如：一只猫咪做出OK手势的表情包，白底黑线，纯文字：旺柴"></textarea>
            
            <div class="style-grid">
                <button class="style-btn" data-style="">默认</button>
                <button class="style-btn" data-style="meme style">表情包</button>
                <button class="style-btn" data-style="emoji style">emoji风格</button>
                <button class="style-btn" data-style="cartoon">卡通</button>
                <button class="style-btn" data-style="chibi">Q版</button>
            </div>
        </div>
        
        <!-- 张数 -->
        <div class="input-section" style="padding-top:12px">
            <div class="input-row">
                <div class="section-title" style="margin-bottom:0;align-self:center">生成数量</div>
                <select class="count-select" id="countSelect">
                    <option value="1">1张</option>
                    <option value="2">2张</option>
                    <option value="3">3张</option>
                    <option value="4">4张</option>
                </select>
            </div>
        </div>
        
        <!-- 生成按钮 -->
        <button class="generate-btn" id="generateBtn">生成表情包</button>
        
        <!-- 进度条 -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <!-- 结果区域 -->
        <div class="result-section" id="resultSection">
            <div class="status-msg" id="statusMsg">输入描述，点击生成</div>
        </div>
        
        <!-- 设置 -->
        <div class="settings-row">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="输入你的 API Key">
            <button class="style-btn" id="saveKeyBtn">保存</button>
        </div>
    </main>
    
    <script src="auth.js"></script>
    <script>
        // 保存 API Key
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const savedKey = localStorage.getItem('msc_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        
        saveKeyBtn.onclick = () => {
            localStorage.setItem('msc_api_key', apiKeyInput.value);
            saveKeyBtn.textContent = '已保存';
            setTimeout(() => saveKeyBtn.textContent = '保存', 1500);
        };
        
        // 风格选择
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.dataset.style) {
                    const p = document.getElementById('promptInput');
                    p.value = p.value ? p.value + ', ' + btn.dataset.style : btn.dataset.style;
                }
            };
        });
        
        // 生成
        const generateBtn = document.getElementById('generateBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const resultSection = document.getElementById('resultSection');
        const promptInput = document.getElementById('promptInput');
        const countSelect = document.getElementById('countSelect');
        
        generateBtn.onclick = async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) { alert('请输入描述'); return; }
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { alert('请输入 API Key'); return; }
            
            const n = parseInt(countSelect.value);
            
            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            progressBar.classList.add('active');
            progressFill.style.width = '20%';
            
            try {
                const response = await fetch('/api-proxy/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-image-2-all',
                        prompt: prompt,
                        n: n,
                        response_format: 'b64_json'
                    })
                });
                
                progressFill.style.width = '70%';
                
                if (!response.ok) throw new Error('API 请求失败');
                
                const data = await response.json();
                const images = data.data || [];
                
                if (images.length === 0) throw new Error('未收到图片数据');
                
                progressFill.style.width = '100%';
                
                let html = '<div class="result-grid">';
                images.forEach((img, i) => {
                    const src = `data:image/png;base64,${img.b64_json}`;
                    html += `
                        <div class="result-item">
                            <img src="${src}" alt="表情包${i+1}">
                            <div class="img-title">第${i+1}张</div>
                        </div>
                    `;
                });
                html += '</div>';
                resultSection.innerHTML = html;
                
            } catch (err) {
                resultSection.innerHTML = `<div class="status-msg" style="color:#ff6b6b">生成失败: ${err.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '生成表情包';
                setTimeout(() => progressBar.classList.remove('active'), 1500);
                progressFill.style.width = '0%';
            }
        };
    </script>
</body>
</html>
