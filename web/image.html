<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ MSC·幻天屿 ⚡</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 页面特定样式 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-neon);
        }
        
        .header h1 {
            font-size: 32px;
            margin: 0;
        }
        
        .header-actions {
            display: flex;
            gap: 16px;
        }
        
        .cyber-btn {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            color: var(--neon-cyan);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cyber-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-primary);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }
        
        .cyber-btn.pink {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }
        
        .cyber-btn.pink:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
        }
        
        /* 设置面板 */
        .settings-panel {
            display: none;
            margin-bottom: 30px;
        }
        
        .settings-panel.active {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .api-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .api-row input {
            flex: 1;
        }
        
        .toggle-visibility {
            width: 50px;
            height: 46px;
            background: transparent;
            border: 2px solid var(--neon-purple);
            border-radius: 10px;
            color: var(--neon-purple);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .toggle-visibility:hover {
            background: var(--neon-purple);
            color: var(--bg-primary);
            box-shadow: 0 0 20px var(--neon-purple);
        }
        
        /* 选项网格 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        /* 数量选择 */
        .count-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .count-btn {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 2px solid var(--border-neon);
            border-radius: 10px;
            color: var(--text-secondary);
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .count-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        
        .count-btn.active {
            background: var(--neon-cyan);
            border-color: var(--neon-cyan);
            color: var(--bg-primary);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        /* 文本域 */
        .prompt-area {
            width: 100%;
            min-height: 150px;
            resize: vertical;
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.8;
        }
        
        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .actions .btn {
            flex: 1;
            min-width: 150px;
            justify-content: center;
            padding: 16px 32px;
        }
        
        /* 结果区域 */
        .result-area {
            margin-top: 30px;
            display: none;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .result-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-neon);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .result-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-cyber);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .result-item:hover {
            transform: scale(1.03);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }
        
        .result-item:hover::before {
            opacity: 1;
        }
        
        .result-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        
        .result-item .info {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-item .info span {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
        }
        
        .result-item .info a {
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .result-item .info a:hover {
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        /* 参考图预览 */
        #refPreview {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border-neon);
            border-radius: 12px;
            display: inline-block;
        }
        
        #refPreviewImg {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
        }
        
        /* 文件上传 */
        input[type="file"] {
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed var(--border-neon);
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        
        input[type="file"]:hover {
            border-color: var(--neon-cyan);
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .actions .btn {
                flex: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 登录覆盖层 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2 data-text="⚡ MSC·幻天屿 ⚡">⚡ MSC·幻天屿 ⚡</h2>
            <input type="text" id="loginUser" placeholder="USERNAME" autocomplete="username">
            <input type="password" id="loginPass" placeholder="PASSWORD" autocomplete="current-password">
            <button onclick="doLogin()">[ ACCESS ]</button>
            <div class="login-error" id="loginError">ACCESS DENIED</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="container">
        <div class="header">
            <h1 class="cyber-title" data-text="⚡ MSC·幻天屿 ⚡">⚡ MSC·幻天屿 ⚡</h1>
            <div class="header-actions">
                <button class="cyber-btn" onclick="toggleSettings()" title="设置">⚙️</button>
                <button class="cyber-btn pink" onclick="location.href='sticker.html'" title="表情包">🎭</button>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="card settings-panel" id="settingsPanel">
            <div class="card-title">⚙️ SYSTEM CONFIG</div>
            <div class="api-row">
                <input type="password" id="apiKey" placeholder="API KEY">
                <button class="toggle-visibility" onclick="toggleKey()">👁</button>
            </div>
            <input type="text" id="baseUrl" placeholder="BASE URL" value="https://api.apiyi.com/v1" style="margin-top:16px;">
            
            <div class="options-grid">
                <div class="form-group">
                    <label>MODEL</label>
                    <select id="modelSelect">
                        <option value="gpt-image-2-all">gpt-image-2-all</option>
                        <option value="gpt-image-2-vip">gpt-image-2-vip</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>QUANTITY</label>
                    <div class="count-selector">
                        <button class="count-btn" onclick="setCount(1)">1</button>
                        <button class="count-btn active" onclick="setCount(2)">2</button>
                        <button class="count-btn" onclick="setCount(4)">4</button>
                        <button class="count-btn" onclick="setCount(6)">6</button>
                        <button class="count-btn" onclick="setCount(8)">8</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>QUALITY</label>
                    <select id="qualitySelect">
                        <option value="standard">STANDARD</option>
                        <option value="hd">HD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>SIZE</label>
                    <select id="sizeSelect">
                        <option value="1024x1024">1024×1024</option>
                        <option value="1536x1024">1536×1024</option>
                        <option value="1024x1536">1024×1536</option>
                        <option value="2048x2048">2048×2048</option>
                        <option value="2048x1152">2048×1152</option>
                        <option value="1920x1080">16:9 WIDE</option>
                        <option value="1080x1920">9:16 PORTRAIT</option>
                        <option value="1024x768">4:3</option>
                        <option value="768x1024">3:4</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 主卡片 -->
        <div class="card">
            <div class="card-title">🎨 IMAGE GENERATOR</div>
            
            <div class="form-group">
                <label>REFERENCE IMAGE (OPTIONAL)</label>
                <input type="file" id="refImage" accept="image/*" onchange="previewRefImage(event)">
                <div id="refPreview" style="display:none;">
                    <img id="refPreviewImg" alt="Reference">
                </div>
            </div>
            
            <div class="form-group">
                <label>PROMPT</label>
                <textarea class="prompt-area" id="prompt" placeholder="Describe the image you want to generate..."></textarea>
            </div>
            
            <div class="actions">
                <button class="btn" onclick="generateImages()">⚡ GENERATE</button>
                <button class="btn btn-outline" onclick="resetForm()">↺ RESET</button>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="result-area" id="resultArea">
            <div class="card">
                <div class="card-title">🖼 GENERATED</div>
                <div class="result-grid" id="resultGrid"></div>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">GENERATING...</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <!-- 大图预览 -->
    <div class="modal-overlay hidden" id="imageModal" onclick="closeModal()">
        <button class="close-btn">✕</button>
        <img id="modalImg" src="" alt="Preview">
    </div>

    <script src="auth.js"></script>
    <script>
        let currentCount = 2;
        let generatedImages = [];

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        function toggleKey() {
            const input = document.getElementById('apiKey');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function setCount(n) {
            currentCount = n;
            document.querySelectorAll('.count-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent == n);
            });
        }

        function previewRefImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('refPreviewImg').src = e.target.result;
                    document.getElementById('refPreview').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
        }

        function resetForm() {
            document.getElementById('prompt').value = '';
            document.getElementById('refImage').value = '';
            document.getElementById('refPreview').style.display = 'none';
            document.getElementById('resultArea').style.display = 'none';
            generatedImages = [];
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }

        function updateProgress(pct) {
            document.getElementById('progressBar').style.width = pct + '%';
        }

        function showModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        async function generateImages() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
            const prompt = document.getElementById('prompt').value.trim();
            const model = document.getElementById('modelSelect').value;
            const quality = document.getElementById('qualitySelect').value;
            const size = document.getElementById('sizeSelect').value;
            const refFile = document.getElementById('refImage').files[0];

            if (!prompt) { alert('请输入图片描述'); return; }
            if (!apiKey) {
                alert('请先在设置中填写 API Key');
                document.getElementById('settingsPanel').classList.add('active');
                return;
            }

            showLoading('GENERATING...');
            updateProgress(0);

            const results = [];
            const grid = document.getElementById('resultGrid');
            grid.innerHTML = '';

            for (let i = 0; i < currentCount; i++) {
                updateProgress((i / currentCount) * 100);
                document.getElementById('loadingText').textContent = `GENERATING ${i + 1}/${currentCount}...`;

                try {
                    const imageData = await callAPI(baseUrl, apiKey, {
                        prompt, model, quality, size,
                        refImage: refFile && i === 0 ? await fileToBase64(refFile) : null
                    });

                    if (imageData) {
                        results.push(imageData);
                        addResultItem(imageData, i + 1);
                    }
                } catch (err) {
                    console.error(`第${i + 1}张生成失败:`, err);
                    addErrorItem(i + 1, err.message);
                }
            }

            generatedImages = results;
            updateProgress(100);
            hideLoading();
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        }

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
        }

        async function callAPI(baseUrl, apiKey, params) {
            const body = { model: params.model, prompt: params.prompt, quality: params.quality, size: params.size, n: 1 };
            if (params.refImage) body.image = params.refImage;

            const response = await fetch(`${baseUrl}/images/generations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(body)
            });

            if (!response.ok) { const err = await response.text(); throw new Error(err); }
            const data = await response.json();

            if (data.data && data.data[0]) {
                const imgData = data.data[0];
                if (imgData.url) {
                    const resp = await fetch(imgData.url);
                    const blob = await resp.blob();
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve({ url: e.target.result, isBase64: true });
                        reader.readAsDataURL(blob);
                    });
                } else if (imgData.b64_json) {
                    return { url: `data:image/png;base64,${imgData.b64_json}`, isBase64: true };
                }
            }
            throw new Error('API 响应无效');
        }

        function addResultItem(imageData, index) {
            const grid = document.getElementById('resultGrid');
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = `
                <img src="${imageData.url}" alt="Image ${index}" onclick="showModal('${imageData.url}')">
                <div class="info">
                    <span>#${String(index).padStart(2, '0')}</span>
                    <a href="${imageData.url}" download="cyber_image_${index}.png" onclick="event.stopPropagation()">[ DOWNLOAD ]</a>
                </div>
            `;
            grid.appendChild(item);
        }

        function addErrorItem(index, message) {
            const grid = document.getElementById('resultGrid');
            const item = document.createElement('div');
            item.className = 'result-item';
            item.style.borderColor = 'var(--neon-pink)';
            item.innerHTML = `
                <div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;">
                    <div>
                        <div style="font-size:32px;margin-bottom:8px;">⚠️</div>
                        <div style="color:var(--neon-pink);">ERROR #${index}</div>
                    </div>
                </div>
            `;
            grid.appendChild(item);
        }

        // 从 localStorage 恢复设置
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('msc_api_key');
            const savedUrl = localStorage.getItem('msc_base_url');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            if (savedUrl) document.getElementById('baseUrl').value = savedUrl;
        });

        document.getElementById('apiKey')?.addEventListener('change', (e) => {
            localStorage.setItem('msc_api_key', e.target.value);
        });
        document.getElementById('baseUrl')?.addEventListener('change', (e) => {
            localStorage.setItem('msc_base_url', e.target.value);
        });
    </script>
</body>
</html>
