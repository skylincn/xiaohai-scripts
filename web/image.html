<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/png" href="/msc_logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC·幻天屿 Image</title>
    <script src="https://cdn.tailwindcss.com">
        var VALID_USER = 'admin';
        var VALID_PASS = 'xiaohaixia';
        var SESSION_KEY = 'msc_logged_in';
        function checkLogin() { if (sessionStorage.getItem(SESSION_KEY) === '1') { document.getElementById('loginOverlay').classList.add('hidden'); return true; } return false; }
        function doLogin() { var user = document.getElementById('loginUser').value; var pass = document.getElementById('loginPass').value; if (user === VALID_USER && pass === VALID_PASS) { sessionStorage.setItem(SESSION_KEY, '1'); document.getElementById('loginOverlay').classList.add('hidden'); } else { document.getElementById('loginError').style.display = 'block'; } }
        document.addEventListener('DOMContentLoaded', function() { checkLogin(); });
        document.addEventListener('keypress', function(e) { if (e.key === 'Enter') { var lo = document.getElementById('loginOverlay'); if (lo && !lo.classList.contains('hidden')) { doLogin(); } } });</script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#212121;color:#e5e5e5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .header{padding:14px 20px;border-bottom:1px solid #2d2d2d;display:flex;align-items:center;gap:10px;background:#1e1e1e;flex-shrink:0}
        .logo-wrap{display:flex;align-items:center;gap:8px}
        .logo-wrap img{height:32px;border-radius:6px}
        .header h1{font-size:17px;font-weight:600;color:#fff}
        .badge{background:#10a37f;color:#fff;font-size:11px;padding:2px 8px;border-radius:12px}
        .sp{flex:1}
        .settings-btn{background:#2d2d2d;border:1px solid #404040;color:#aaa;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
        .settings-btn:hover{background:#3a3a3a}
        .main-body{display:flex;flex:1;overflow:hidden}
        .left-panel{width:260px;min-width:260px;flex-shrink:0;background:#1a1a1a;border-right:1px solid #2d2d2d;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
        .left-panel.hidden{display:none}
        .panel-section{padding:12px 14px;border-bottom:1px solid #252525}
        .panel-section:last-child{border-bottom:none}
        .panel-section label{font-size:11px;color:#777;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
        .panel-section select,.panel-section input[type=text],.panel-section input[type=password]{background:#2d2d2d;border:1px solid #404040;color:#fff;padding:6px 8px;border-radius:6px;font-size:13px;width:100%;outline:none}
        .panel-section select:focus,.panel-section input:focus{border-color:#10a37f}
        .count-select{display:flex;gap:4px}
        .count-select button{flex:1;background:#2d2d2d;border:1px solid #404040;color:#888;padding:5px 0;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
        .count-select button.active{background:#10a37f;border-color:#10a37f;color:#fff}
        .count-select button:hover:not(.active){border-color:#606060;color:#ccc}
        .api-key-wrap{position:relative}
        .api-key-wrap input{padding-right:30px}
        .api-key-wrap .toggle-key{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:14px}
        .ref-img-box{background:#2d2d2d;border:1px dashed #404040;border-radius:8px;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
        .ref-img-box:hover{border-color:#10a37f}
        .ref-img-box .placeholder{color:#555;font-size:12px;text-align:center;padding:10px}
        .ref-img-box .placeholder .plus{font-size:24px;color:#444;display:block;margin-bottom:4px}
        .ref-img-box img.preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
        .ref-img-box .remove-ref{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
        .ref-img-box.has-img .remove-ref{display:flex}
        .ref-img-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
        .right-canvas{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
        .message.user{text-align:right}
        .message.user .bubble{background:#10a37f;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;display:inline-block;max-width:85%;text-align:left;font-size:14px}
        .message.assistant .bubble{background:#2d2d2d;color:#e5e5e5;padding:10px 14px;border-radius:14px 14px 14px 4px;display:inline-block;max-width:100%;font-size:14px}
        .image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:10px}
        .image-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;background:#2d2d2d;cursor:pointer;transition:transform .2s}
        .image-grid img:hover{transform:scale(1.02)}
        .image-card{position:relative}
        .image-card .img-overlay{position:absolute;top:6px;right:6px;display:flex;gap:4px}
        .image-card .img-overlay button{background:rgba(0,0,0,0.65);border:none;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:13px;backdrop-filter:blur(4px)}
        .empty-state{text-align:center;padding:60px 24px;color:#555;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .empty-state .icon{font-size:52px;margin-bottom:14px;line-height:1}
        .empty-state p{font-size:14px;line-height:1.7}
        .loading-area{display:flex;align-items:center;gap:10px;color:#888;font-size:13px;margin:10px 0}
        .spinner{width:18px;height:18px;border:2px solid #333;border-top-color:#10a37f;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .progress-bar-wrap{flex:1;max-width:200px;height:5px;background:#2d2d2d;border-radius:3px;overflow:hidden}
        .progress-bar{height:100%;background:#10a37f;border-radius:3px;transition:width .3s;width:0%}
        .error-msg{color:#ef4444;font-size:13px;padding:7px 10px;background:rgba(239,68,68,0.1);border-radius:7px;margin-top:6px;display:inline-block}
        .input-area{padding:12px 16px;border-top:1px solid #2d2d2d;background:#1e1e1e;flex-shrink:0}
        .input-box{background:#2d2d2d;border:1px solid #404040;border-radius:10px;overflow:hidden;margin-bottom:8px}
        .input-box textarea{width:100%;background:transparent;border:none;color:#fff;padding:10px 14px;resize:none;font-size:14px;outline:none;min-height:48px;max-height:160px;line-height:1.5}
        .input-box textarea::placeholder{color:#666}
        .input-settings{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
        .input-settings .item{display:flex;align-items:center;gap:4px}
        .input-settings .item label{font-size:11px;color:#666;white-space:nowrap}
        .input-settings select,.input-settings input{background:#2d2d2d;border:1px solid #404040;color:#fff;padding:4px 6px;border-radius:6px;font-size:12px;outline:none}
        .input-settings select:focus,.input-settings input:focus{border-color:#10a37f}
        .input-row{display:flex;gap:8px;align-items:center}
        .gen-btn{background:#10a37f;border:none;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;height:44px}
        .gen-btn:hover{background:#0d8a6a}
        .gen-btn:disabled{background:#1a4a3a;color:#5a8a7a;cursor:not-allowed}
        .reset-btn{background:transparent;border:1px solid #404040;color:#aaa;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;height:44px}
        .ref-preview-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
        .ref-preview-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid #404040;background:#2d2d2d}
        .ref-preview-name{font-size:11px;color:#777;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ref-preview-remove{background:none;border:none;color:#888;cursor:pointer;font-size:14px;padding:0 4px}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;display:none;align-items:center;justify-content:center}
        .modal-overlay img{max-width:90vw;max-height:90vh;border-radius:12px}

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .left-panel {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left .25s ease;
                box-shadow: 2px 0 12px rgba(0,0,0,0.4);
            }
            .left-panel.mobile-open {
                left: 0;
            }
            .left-panel.hidden-mobile {
                display: flex !important;
            }
            .mobile-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
                opacity: 0;
                pointer-events: none;
                transition: opacity .25s;
            }
            .mobile-overlay.active {
                opacity: 1;
                pointer-events: auto;
            }
            .header .mobile-menu-btn {
                display: flex !important;
            }
            .main-body {
                display: flex !important;
                flex-direction: column !important;
            }
            .right-canvas {
                flex: 1 !important;
                min-height: 0 !important;
            }
            .messages {
                padding: 12px !important;
            }
            .input-area {
                padding: 10px 12px !important;
            }
        }
        @media (min-width: 769px) {
            .mobile-overlay {
                display: none !important;
            }
            .header .mobile-menu-btn {
                display: none !important;
            }
        }
        .header .mobile-menu-btn {
            background: #2d2d2d; border: 1px solid #404040; color: #aaa;
            width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
            font-size: 16px; display: none; align-items: center; justify-content: center;
        }
        .header .mobile-menu-btn:hover { background: #3a3a3a; }
        .modal-overlay .close-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
        .login-overlay { position: fixed; inset: 0; background: #212121; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .login-overlay.hidden { display: none; }
        .login-overlay .login-logo { width: 80px; height: 80px; border-radius: 12px; }
        .login-overlay .login-title { font-size: 24px; font-weight: 600; color: #fff; }
        .login-overlay .login-form { display: flex; flex-direction: column; gap: 12px; width: 280px; }
        .login-overlay .login-form input { background: #2d2d2d; border: 1px solid #404040; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
        .login-overlay .login-form input:focus { border-color: #10a37f; }
        .login-overlay .login-form button { background: #10a37f; border: none; color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .login-overlay .login-form button:hover { background: #0d8a6a; }
        .login-overlay .login-error { color: #ef4444; font-size: 12px; display: none; }
    </style>
</head>
<body>
        <div id="loginOverlay" class="login-overlay">
        <img src="/msc_logo.png?v=3" class="login-logo">
        <div class="login-title">MSC·幻天屿</div>
        <div class="login-form">
            <input type="text" id="loginUser" placeholder="用户名" autocomplete="off">
            <input type="password" id="loginPass" placeholder="密码">
            <button onclick="doLogin()">登录</button>
            <div class="login-error" id="loginError">用户名或密码错误</div>
        </div>
    </div>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobilePanel()"></div>
    <div class="header">
        <div class="logo-wrap"><img src="/msc_logo.png?v=3" id="logoImg"></div>
        <h1>MSC·幻天屿</h1>
        <span class="badge">gpt-image-2</span>
        <div class="sp"></div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobilePanel()">☰</button>
        <button class="settings-btn" onclick="toggleLeftPanel()">⚙️</button>
        <button class="settings-btn" onclick="window.open('/sticker.html','_blank')" title="表情包">🎭</button>
    </div>
    <div class="main-body">
        <div class="left-panel" id="leftPanel">
            <div class="panel-section">
                <label>API Key</label>
                <div class="api-key-wrap">
                    <input type="password" id="apiKey" value="sk-h3LbjhNvSgv46uFm2d36B651439642E5Bb4bFcC2237aAa02" autocomplete="off">
                    <button class="toggle-key" onclick="toggleKey()">👁</button>
                </div>
            </div>
            <div class="panel-section">
                <label>Base URL</label>
                <input type="text" id="baseUrl" value="https://api.apiyi.com/v1">
            </div>
            <div class="panel-section">
                <label>模型</label>
                <select id="modelSelect">
                    <option value="gpt-image-2-all">gpt-image-2-all</option>
                    <option value="gpt-image-2-vip">gpt-image-2-vip</option>
                </select>
            </div>
            <div class="panel-section">
                <label>图片数量</label>
                <div class="count-select" id="countSelect">
                    <button data-n="1" class="active">1</button>
                    <button data-n="2">2</button>
                    <button data-n="4">4</button>
                    <button data-n="6">6</button>
                    <button data-n="8">8</button>
                </div>
            </div>
            <div class="panel-section">
                <label>质量</label>
                <select id="qualitySelect">
                    <option value="standard">standard</option>
                    <option value="hd">hd</option>
                </select>
            </div>
            <div class="panel-section">
                <label>尺寸</label>
                <select id="sizeSelect">
                    <option value="1024x1024">1024×1024</option>
                    <option value="1536x1024">1536×1024</option>
                    <option value="1024x1536">1024×1536</option>
                    <option value="2048x2048">2048×2048</option>
                    <option value="2048x1152">2048×1152</option>
                    <option value="横版16:9">横版16:9</option>
                    <option value="竖屏9:16">竖屏9:16</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4">3:4</option>
                </select>
            </div>
            <div class="panel-section">
                <label>参考图（图生图）</label>
                <div class="ref-img-box" id="refImgBox">
                    <div class="placeholder" id="refPlaceholder">
                        <span class="plus">+</span>
                        <span>点击上传参考图</span>
                    </div>
                    <img class="preview" id="refPreview" style="display:none">
                    <button class="remove-ref" id="refRemoveBtn" onclick="event.stopPropagation();removeRef()">✕</button>
                    <input type="file" accept="image/*" id="refFileInput" onchange="handleRefFile(this)">
                </div>
            </div>
        </div>
        <div class="right-canvas">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="icon"><img src="/msc_logo.png" style="width:200px;height:200px;border-radius:12px"></div>
                    <p>输入提示词，选择图片数量<br>点击「生成」即可创建 AI 图像</p>
                </div>
            </div>
            <div class="input-area">
                <div class="ref-preview-row" id="refPreviewRow" style="display:none">
                    <img class="ref-preview-thumb" id="refThumb">
                    <span class="ref-preview-name" id="refName">参考图.png</span>
                    <button class="ref-preview-remove" onclick="removeRef()">✕</button>
                </div>
                <div class="input-box">
                    <textarea id="promptInput" placeholder="描述你想要生成的图片..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();generateImages()}" oninput="autoResize(this)"></textarea>
                </div>
                <div class="input-row">
                    <button class="reset-btn" onclick="resetAll()">重置</button>
                    <div style="flex:1"></div>
                    <button class="gen-btn" id="genBtn" onclick="generateImages()">生成</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="imgModal" style="display:none" onclick="closeModal(event)">
        <button class="close-btn" onclick="closeModalForce()">✕</button>
        <img id="modalImg" src="" alt="preview">
    </div>
    <script>
        let n = 1;
        let generating = false;
        let refImageB64 = null;

        document.querySelectorAll('#countSelect button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#countSelect button').forEach(b => { b.classList.remove('active'); b.style.background='#2d2d2d'; b.style.borderColor='#404040'; b.style.color='#888'; });
                btn.classList.add('active');
                btn.style.background='#10a37f';
                btn.style.borderColor='#10a37f';
                btn.style.color='#fff';
                n = parseInt(btn.dataset.n);
            });
        });

        function toggleKey() {
            const input = document.getElementById('apiKey');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function toggleLeftPanel() {
            const panel = document.getElementById('leftPanel');
            panel.classList.toggle('hidden');
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function getApiKey() { return document.getElementById('apiKey').value.trim(); }
        function getBaseUrl() { return document.getElementById('baseUrl').value.trim().replace(/\/$/, ''); }
        function getPrompt() { return document.getElementById('promptInput').value.trim(); }
        function getSize() { return document.getElementById('sizeSelect').value; }
        function getQuality() { return document.getElementById('qualitySelect').value; }
        function getModel() { return document.getElementById('modelSelect').value; }

        function setGenBtnState(disabled, text) {
            const btn = document.getElementById('genBtn');
            btn.disabled = disabled;
            btn.textContent = text || (disabled ? '生成中…' : '生成');
        }

        function addMessage(role, content, images) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (images && images.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'image-grid';
                images.forEach((src, idx) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'Generated image ' + (idx + 1);
                    img.onclick = () => openModal(src);
                    const overlay = document.createElement('div');
                    overlay.className = 'img-overlay';
                    const dlBtn = document.createElement('button');
                    dlBtn.textContent = '⬇';
                    dlBtn.title = '下载图片';
                    dlBtn.onclick = (e) => { e.stopPropagation(); downloadImage(src, 'image_' + (idx+1) + '.png'); };
                    const openBtn = document.createElement('button');
                    openBtn.textContent = '↗';
                    openBtn.title = '新窗口打开';
                    openBtn.onclick = (e) => { e.stopPropagation(); window.open(src, '_blank'); };
                    overlay.appendChild(dlBtn);
                    overlay.appendChild(openBtn);
                    card.appendChild(img);
                    card.appendChild(overlay);
                    grid.appendChild(card);
                });
                bubble.appendChild(grid);
            }
            if (content) {
                const p = document.createElement('p');
                p.style.marginBottom = images ? '8px' : '0';
                if (images) { p.style.color = '#aaa'; p.style.fontSize = '13px'; }
                p.textContent = content;
                bubble.insertBefore(p, bubble.firstChild);
            }
            div.appendChild(bubble);
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 1e9;
            return div;
        }

        function showError(msg) {
            const existing = document.querySelector('.error-msg');
            if (existing) existing.remove();
            const el = document.createElement('div');
            el.className = 'error-msg';
            el.textContent = msg;
            document.getElementById('messages').appendChild(el);
            document.getElementById('messages').scrollTop = 1e9;
        }

        function clearErrors() { document.querySelectorAll('.error-msg').forEach(e => e.remove()); }

        function showLoading(count) {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loadingMsg';
            div.innerHTML = '<div class="bubble"><div class="loading-area"><div class="spinner"></div><span id="loadingText">正在生成 0/' + count + ' 张图片…</span><div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div></div></div>';
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 1e9;
        }

        function updateProgress(done, total) {
            const text = document.getElementById('loadingText');
            const bar = document.getElementById('progressBar');
            if (text) text.textContent = '正在生成 ' + done + '/' + total + ' 张图片…';
            if (bar) bar.style.width = Math.round((done / total) * 100) + '%';
        }

        function removeLoading() { var el = document.getElementById('loadingMsg'); if (el) el.remove(); }

        function handleRefFile(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                refImageB64 = e.target.result;
                document.getElementById('refPreview').src = refImageB64;
                document.getElementById('refPreview').style.display = 'block';
                document.getElementById('refPlaceholder').style.display = 'none';
                document.getElementById('refImgBox').classList.add('has-img');
                document.getElementById('refPreviewRow').style.display = 'flex';
                document.getElementById('refThumb').src = refImageB64;
                document.getElementById('refName').textContent = file.name;
            };
            reader.readAsDataURL(file);
        }

        function removeRef() {
            refImageB64 = null;
            document.getElementById('refPreview').src = '';
            document.getElementById('refPreview').style.display = 'none';
            document.getElementById('refPlaceholder').style.display = 'block';
            document.getElementById('refImgBox').classList.remove('has-img');
            document.getElementById('refFileInput').value = '';
            document.getElementById('refPreviewRow').style.display = 'none';
        }

        async function generateImages() {
            if (generating) return;
            var key = getApiKey();
            var prompt = getPrompt();
            if (!key) { showError('请先填写 API Key'); return; }
            if (!prompt) { showError('请输入提示词'); return; }

            clearErrors();
            generating = true;
            setGenBtnState(true);
            var emptyState = document.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            var size = getSize();
            var quality = getQuality();
            var model = getModel();
            var baseUrl = getBaseUrl();

            var reqBody = { model: model, prompt: prompt };
            if (model !== 'gpt-image-2-all') {
                reqBody.n = 1;
                reqBody.size = size;
                if (quality && model !== 'gpt-image-2-vip') reqBody.quality = quality;
            } else {
                if (!size.includes(':') && !size.includes('：')) {
                    reqBody.prompt = size + '，' + prompt;
                } else {
                    reqBody.prompt = size + '，' + prompt;
                }
            }

            if (refImageB64) {
                reqBody.image = refImageB64.split(',')[1];
            }

            showLoading(n);
            var results = [];
            var done = 0;

            try {
                var endpoint = baseUrl + '/images/generations';
                var promises = [];
                for (var i = 0; i < n; i++) {
                    var p = fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
                        body: JSON.stringify(reqBody)
                    }).then(async function(resp) {
                        var data = await resp.json();
                        if (!resp.ok) throw new Error((data.error && data.error.message) || '请求失败 ' + resp.status);
                        return data.data[0].b64_json || data.data[0].url;
                    }).then(function(b64) {
                        var src = b64.startsWith('data:') ? b64 : 'data:image/png;base64,' + b64;
                        results.push(src);
                        done++;
                        updateProgress(done, n);
                    }).catch(function(err) {
                        done++;
                        updateProgress(done, n);
                        throw err;
                    });
                    promises.push(p);
                }

                await Promise.all(promises);
                removeLoading();
                addMessage('user', prompt, null);
                addMessage('assistant', '\u2705 已生成 ' + results.length + ' 张图片（模型: ' + model + '）', results);
            } catch (err) {
                removeLoading();
                var lastUser = document.querySelector('.message.user:last-child');
                if (lastUser) {
                    var errEl = document.createElement('div');
                    errEl.className = 'error-msg';
                    errEl.textContent = '\u274c ' + err.message;
                    lastUser.appendChild(errEl);
                } else {
                    showError('\u274c ' + err.message);
                }
            } finally {
                generating = false;
                setGenBtnState(false, '\u751f\u6210');
                document.getElementById('promptInput').value = '';
                document.getElementById('promptInput').style.height = 'auto';
            }
        }

        function resetAll() {
            if (generating) return;
            document.getElementById('promptInput').value = '';
            document.getElementById('promptInput').style.height = 'auto';
            document.getElementById('messages').innerHTML = '<div class="empty-state"><div class="icon"><img src="/msc_logo.png" style="width:200px;height:200px;border-radius:12px"></div><p>输入提示词，选择图片数量<br>点击「生成」即可创建 AI 图像</p></div>';
            removeRef();
        }

        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imgModal').style.display = 'flex';
        }

        function closeModal(e) { if (e.target === e.currentTarget) closeModalForce(); }
        function closeModalForce() { document.getElementById('imgModal').style.display = 'none'; }

            var a = document.createElement('a');
            a.href = src;
            a.download = filename;
            a.click();
        }

        function toggleMobilePanel() {
            var panel = document.getElementById('leftPanel');
            var overlay = document.getElementById('mobileOverlay');
            panel.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
        function closeMobilePanel() {
            var panel = document.getElementById('leftPanel');
            var overlay = document.getElementById('mobileOverlay');
            panel.classList.remove('mobile-open');
            overlay.classList.remove('active');
        }

    
        var VALID_USER = 'admin';
        var VALID_PASS = 'xiaohaixia';
        var SESSION_KEY = 'msc_logged_in';
        function checkLogin() { if (sessionStorage.getItem(SESSION_KEY) === '1') { document.getElementById('loginOverlay').classList.add('hidden'); return true; } return false; }
        function doLogin() { var user = document.getElementById('loginUser').value; var pass = document.getElementById('loginPass').value; if (user === VALID_USER && pass === VALID_PASS) { sessionStorage.setItem(SESSION_KEY, '1'); document.getElementById('loginOverlay').classList.add('hidden'); } else { document.getElementById('loginError').style.display = 'block'; } }
        document.addEventListener('DOMContentLoaded', function() { checkLogin(); });
        document.addEventListener('keypress', function(e) { if (e.key === 'Enter') { var lo = document.getElementById('loginOverlay'); if (lo && !lo.classList.contains('hidden')) { doLogin(); } } });</script>
