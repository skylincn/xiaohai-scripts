<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC·幻天屿 - AI 图片生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff00aa;
            --neon-purple: #b967ff;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #1e1e2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 320px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 18px;
            color: var(--neon-cyan);
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .login-error {
            color: #ff6b6b;
            margin-top: 12px;
            display: none;
            text-align: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: var(--neon-cyan); }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .style-btn {
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .style-btn:hover, .style-btn.active {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .setting-item label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .setting-item select, .setting-item input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
        .file-input-wrapper {
            margin-top: 12px;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 2px dashed var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
        }
        .file-preview {
            margin-top: 12px;
            display: none;
        }
        .file-preview img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--neon-purple);
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
        }
        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-bar {
            height: 4px;
            background: var(--bg-dark);
            border-radius: 2px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }
        .progress-bar.active { display: block; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            width: 0%;
            transition: width 0.3s;
        }
        .result-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .result-item {
            background: var(--bg-dark);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .result-item:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        .result-item img {
            width: 100%;
            display: block;
        }
        .result-item .img-title {
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
        }
        .result-item .download-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        .status-msg {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
            font-size: 14px;
        }
        .settings-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .settings-row label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .settings-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            display: none;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 MSC·幻天屿</h2>
            <input type="text" id="loginUser" placeholder="用户名" autocomplete="username">
            <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
            <button onclick="doLogin()">登录</button>
            <div class="login-error" id="loginError">用户名或密码错误</div>
        </div>
    </div>

    <header class="header">
        <span class="logo-text">MSC·幻天屿</span>
    </header>

    <main class="container">
        <!-- 提示词输入 -->
        <div class="card">
            <div class="section-title">描述你想要的图片</div>
            <textarea id="promptInput" placeholder="比如：一只穿着航天服的猫咪在月球上漂浮，赛博朋克风格，高清细节"></textarea>
            <div class="style-grid">
                <button class="style-btn" data-style="">默认</button>
                <button class="style-btn" data-style="photorealistic">写实摄影</button>
                <button class="style-btn" data-style="anime">动漫</button>
                <button class="style-btn" data-style="cyberpunk">赛博朋克</button>
                <button class="style-btn" data-style="watercolor">水彩</button>
                <button class="style-btn" data-style="oil painting">油画</button>
            </div>
        </div>

        <!-- 高级设置 -->
        <div class="card">
            <div class="section-title">高级设置</div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>模型</label>
                    <select id="modelSelect">
                        <option value="gpt-image-2-all">gpt-image-2-all</option>
                        <option value="gpt-image-2-vip">gpt-image-2-vip</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>图片数量</label>
                    <select id="countSelect">
                        <option value="1">1张</option>
                        <option value="2" selected>2张</option>
                        <option value="4">4张</option>
                        <option value="6">6张</option>
                        <option value="8">8张</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>质量</label>
                    <select id="qualitySelect">
                        <option value="standard">标准</option>
                        <option value="hd">高清</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>尺寸</label>
                    <select id="sizeSelect">
                        <option value="1024x1024">1024×1024</option>
                        <option value="1536x1024">1536×1024</option>
                        <option value="1024x1536">1024×1536</option>
                        <option value="2048x2048">2048×2048</option>
                        <option value="1920x1080">16:9 宽屏</option>
                        <option value="1080x1920">9:16 竖屏</option>
                    </select>
                </div>
            </div>
            <div class="file-input-wrapper">
                <label style="font-size:12px;color:var(--text-dim);margin-bottom:6px;display:block;">参考图（可选，图生图）</label>
                <input type="file" id="refImage" accept="image/*" onchange="previewRefImage(event)">
                <div class="file-preview" id="filePreview">
                    <img id="previewImg" alt="预览">
                </div>
            </div>
        </div>

        <!-- 生成按钮 -->
        <button class="generate-btn" id="generateBtn">✨ 生成图片</button>

        <!-- 进度条 -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 结果区域 -->
        <div class="result-section" id="resultSection">
            <div class="status-msg" id="statusMsg">输入提示词，点击生成</div>
        </div>

        <!-- API 设置 -->
        <div class="card">
            <div class="section-title">API 设置</div>
            <div class="settings-row">
                <label>Base URL</label>
                <input type="text" id="baseUrl" placeholder="https://api.example.com/v1" value="">
            </div>
            <div class="settings-row" style="margin-top:12px;">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入你的 API Key">
                <button class="style-btn" id="saveKeyBtn" style="min-width:60px;">保存</button>
            </div>
        </div>
    </main>

    <!-- 大图预览 -->
    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <button class="modal-close">✕</button>
        <img id="modalImg" src="" alt="大图预览">
    </div>

    <script src="auth.js"></script>
    <script>
        // 登录验证
        const VALID_USER = 'admin';
        const VALID_PASS_HASH = 'eGlhb2hhaXhpYQ=='; // xiaohaixia base64
        
        function checkLogin() {
            if (sessionStorage.getItem('msc_logged_in') === '1') {
                document.getElementById('loginOverlay').classList.add('hidden');
                return true;
            }
            return false;
        }
        
        function doLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if (user === VALID_USER && pass === atob(VALID_PASS_HASH)) {
                sessionStorage.setItem('msc_logged_in', '1');
                document.getElementById('loginOverlay').classList.add('hidden');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        document.addEventListener('DOMContentLoaded', checkLogin);
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('loginOverlay').classList.contains('hidden')) {
                doLogin();
            }
        });

        // API Key 保存
        const apiKeyInput = document.getElementById('apiKey');
        const baseUrlInput = document.getElementById('baseUrl');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        
        const savedKey = localStorage.getItem('msc_api_key');
        const savedUrl = localStorage.getItem('msc_base_url');
        if (savedKey) apiKeyInput.value = savedKey;
        if (savedUrl) baseUrlInput.value = savedUrl;
        
        saveKeyBtn.onclick = () => {
            localStorage.setItem('msc_api_key', apiKeyInput.value);
            localStorage.setItem('msc_base_url', baseUrlInput.value);
            saveKeyBtn.textContent = '已保存';
            setTimeout(() => saveKeyBtn.textContent = '保存', 1500);
        };

        // 风格选择
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.dataset.style) {
                    const p = document.getElementById('promptInput');
                    p.value = p.value ? p.value + ', ' + btn.dataset.style : btn.dataset.style;
                }
            };
        });

        // 参考图预览
        let refImageBase64 = null;
        function previewRefImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                refImageBase64 = e.target.result.split(',')[1];
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('filePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 生成
        const generateBtn = document.getElementById('generateBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const resultSection = document.getElementById('resultSection');
        const promptInput = document.getElementById('promptInput');

        generateBtn.onclick = async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) { alert('请输入提示词'); return; }
            
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { alert('请输入 API Key'); return; }
            
            const baseUrl = baseUrlInput.value.trim() || '/api-proxy/v1';
            const model = document.getElementById('modelSelect').value;
            const n = parseInt(document.getElementById('countSelect').value);
            const quality = document.getElementById('qualitySelect').value;
            const size = document.getElementById('sizeSelect').value;

            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            progressBar.classList.add('active');
            progressFill.style.width = '10%';

            try {
                const body = {
                    model: model,
                    prompt: prompt,
                    n: n,
                    quality: quality,
                    size: size,
                    response_format: 'b64_json'
                };
                
                // 图生图
                if (refImageBase64) {
                    body.image = refImageBase64;
                }

                const response = await fetch(`${baseUrl}/images/generations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(body)
                });

                progressFill.style.width = '70%';

                if (!response.ok) throw new Error('API 请求失败: ' + response.status);
                
                const data = await response.json();
                const images = data.data || [];
                
                if (images.length === 0) throw new Error('未收到图片数据');

                progressFill.style.width = '100%';

                // 显示结果
                let html = '<div class="result-grid">';
                images.forEach((img, i) => {
                    const src = `data:image/png;base64,${img.b64_json}`;
                    html += `
                        <div class="result-item" onclick="showModal('${src}')">
                            <img src="${src}" alt="生成图片 ${i+1}">
                            <div class="img-title">图片 ${i+1}</div>
                            <a href="${src}" download="msc_image_${i+1}.png" class="download-btn" onclick="event.stopPropagation()">下载</a>
                        </div>
                    `;
                });
                html += '</div>';
                resultSection.innerHTML = html;

            } catch (err) {
                resultSection.innerHTML = `<div class="status-msg" style="color:#ff6b6b">生成失败: ${err.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '✨ 生成图片';
                setTimeout(() => progressBar.classList.remove('active'), 1500);
                progressFill.style.width = '0%';
            }
        };

        // 大图预览
        function showModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
    </script>
</body>
</html>
